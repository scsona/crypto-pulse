name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest
      - name: Run tests
        run: pytest -q
      - name: Smoke-test the CLI (demo mode, no key)
        run: |
          python -m crypto_pulse card --demo -o /tmp/card.svg
          python -m crypto_pulse dash --demo --once > /tmp/frame.txt
          test -s /tmp/card.svg && test -s /tmp/frame.txt
